name: Market Price Sync

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
         python-version: '3.10'

      - name: Install Dependencies

        run: |
         python -m pip install --upgrade pip
         pip install yfinance pandas

      - name: Run Price Engine
        run: python price_engine.py

      - name: Commit and push the vault
        run: |
         git config --global user.name 'Market Sync Bot'
         git config --global user.email 'actions@github.com'
         git add portfolio.db
         git commit -m "Auto-update market prices" || echo "Nochanges to commit"
         git push
