name: Market Price Sync

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
         python-version: '3.10'

      - name: Install Dependencies

        run: |
         python -m pip install --upgrade pip
         pip install yfinance pandas sqlalchemy psycopg2-binary google-generativeai

      - name: Run Price Engine
        run: python price_engine.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL}}

      - name: Run AI Engine
        run: python ai_engine.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL}}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY}}

  
